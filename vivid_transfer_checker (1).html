
<h2 class="sr-only">Vivid international transfer eligibility checker — select a country, currency and IBAN type to check if a transfer is possible</h2>

<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1.25rem 0;max-width:680px}
.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:1rem}
label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;font-weight:500}
select,input{width:100%;font-size:14px}
.result{border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-top:1rem;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.result.ok{border-color:var(--color-border-success);background:var(--color-background-success)}
.result.fail{border-color:var(--color-border-danger);background:var(--color-background-danger)}
.result.warn{border-color:var(--color-border-warning);background:var(--color-background-warning)}
.result-title{font-size:15px;font-weight:500;margin-bottom:6px}
.result-title.ok{color:var(--color-text-success)}
.result-title.fail{color:var(--color-text-danger)}
.result-title.warn{color:var(--color-text-warning)}
.result-body{font-size:13px;color:var(--color-text-secondary);line-height:1.6}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary)}
.pill.bc{background:#e6f1fb;color:#0c447c;border-color:#85b7eb}
.pill.thunes{background:#e1f5ee;color:#085041;border-color:#5dcaa5}
.pill.wise{background:#eeedfe;color:#3c3489;border-color:#afa9ec}
.pill.b2b{background:#faeeda;color:#633806;border-color:#ef9f27}
.pill.b2c{background:#f1efe8;color:#2c2c2a;border-color:#b4b2a9}
.idle{color:var(--color-text-tertiary);font-size:13px}
.search-wrap{position:relative}
#country-input{padding-right:28px}
.clear-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:14px;padding:0;line-height:1}
.suggestions{position:absolute;top:100%;left:0;right:0;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);z-index:10;max-height:200px;overflow-y:auto;margin-top:2px}
.suggestion{padding:8px 12px;font-size:13px;cursor:pointer;color:var(--color-text-primary)}
.suggestion:hover,.suggestion.active{background:var(--color-background-secondary)}
.no-results{padding:8px 12px;font-size:13px;color:var(--color-text-tertiary)}
.selected-country{font-size:13px;color:var(--color-text-secondary);margin-top:3px;min-height:16px}
</style>

<div class="wrap">

<div class="row">
  <div>
    <label>Country</label>
    <div class="search-wrap">
      <input type="text" id="country-input" placeholder="Search country..." autocomplete="off">
      <button class="clear-btn" id="clear-country" style="display:none">&#x2715;</button>
      <div class="suggestions" id="suggestions" style="display:none"></div>
    </div>
    <div class="selected-country" id="selected-country-label"></div>
  </div>
  <div>
    <label>Currency</label>
    <select id="currency-select"><option value="">Select...</option></select>
  </div>
  <div>
    <label>IBAN type</label>
    <select id="iban-select">
      <option value="">Select...</option>
      <option value="DE">DE IBAN (Banking Circle)</option>
      <option value="LU_BC">LU IBAN – 4080 (Banking Circle)</option>
      <option value="DK">DK IBAN (Banking Circle)</option>
      <option value="LU_VIVID">LU IBAN – 815x (Vivid)</option>
      <option value="NL">NL IBAN (Vivid)</option>
      <option value="ES">ES IBAN (Vivid)</option>
      <option value="IT">IT IBAN (Vivid)</option>
      <option value="FR">FR IBAN (Vivid)</option>
    </select>
  </div>
</div>

<div class="result" id="result-box">
  <div class="idle">Select a country, currency and IBAN type to check transfer eligibility.</div>
</div>

</div>

const COUNTRY_NAMES = {"AD":"Andorra","AT":"Austria","AU":"Australia","AX":"\u00c5land Islands","BE":"Belgium","BG":"Bulgaria","CA":"Canada","CH":"Switzerland","CL":"Chile","CY":"Cyprus","CZ":"Czechia","DE":"Germany","DK":"Denmark","EE":"Estonia","ES":"Spain","FI":"Finland","FO":"Faroe Islands","FR":"France","GB":"United Kingdom","GL":"Greenland","GR":"Greece","HK":"Hong Kong","HR":"Croatia","HU":"Hungary","IE":"Ireland","IL":"Israel","IS":"Iceland","IT":"Italy","JP":"Japan","KR":"South Korea","LI":"Liechtenstein","LT":"Lithuania","LU":"Luxembourg","LV":"Latvia","MC":"Monaco","MT":"Malta","MY":"Malaysia","NL":"Netherlands","NO":"Norway","NZ":"New Zealand","PL":"Poland","PT":"Portugal","RO":"Romania","SE":"Sweden","SG":"Singapore","SI":"Slovenia","SJ":"Svalbard and Jan Mayen","SK":"Slovakia","TR":"Turkey","TW":"Taiwan","US":"United States","AL":"Albania","BL":"Saint Barth\u00e9lemy","GF":"French Guiana","GG":"Guernsey","GI":"Gibraltar","GP":"Guadeloupe","IM":"Isle of Man","JE":"Jersey","MD":"Moldova","ME":"Montenegro","MF":"Saint Martin","MK":"North Macedonia","MQ":"Martinique","PM":"Saint Pierre and Miquelon","RE":"R\u00e9union","SM":"San Marino","VA":"Vatican City","YT":"Mayotte","AE":"United Arab Emirates","BR":"Brazil","CN":"China","EG":"Egypt","ID":"Indonesia","LK":"Sri Lanka","PH":"Philippines","RS":"Serbia","TH":"Thailand","AR":"Argentina","CR":"Costa Rica","IN":"India","MX":"Mexico","UY":"Uruguay","AG":"Antigua and Barbuda","AW":"Aruba","AZ":"Azerbaijan","BA":"Bosnia and Herzegovina","BD":"Bangladesh","BH":"Bahrain","BJ":"Benin","BM":"Bermuda","BN":"Brunei","BS":"Bahamas","BT":"Bhutan","BW":"Botswana","CV":"Cabo Verde","DM":"Dominica","DO":"Dominican Republic","EC":"Ecuador","ET":"Ethiopia","FJ":"Fiji","FM":"Micronesia","GA":"Gabon","GD":"Grenada","GE":"Georgia","GH":"Ghana","GM":"Gambia","GN":"Guinea","GT":"Guatemala","GY":"Guyana","HN":"Honduras","KH":"Cambodia","KN":"Saint Kitts and Nevis","KW":"Kuwait","KY":"Cayman Islands","LC":"Saint Lucia","LR":"Liberia","LS":"Lesotho","MA":"Morocco","MN":"Mongolia","MO":"Macao","MR":"Mauritania","MU":"Mauritius","MV":"Maldives","MW":"Malawi","NE":"Niger","NI":"Nicaragua","NR":"Nauru","OM":"Oman","PE":"Peru","PF":"French Polynesia","PG":"Papua New Guinea","PW":"Palau","PY":"Paraguay","QA":"Qatar","RW":"Rwanda","SA":"Saudi Arabia","SC":"Seychelles","SL":"Sierra Leone","SR":"Suriname","ST":"Sao Tome and Principe","SV":"El Salvador","TJ":"Tajikistan","TL":"Timor-Leste","TN":"Tunisia","TO":"Tonga","TV":"Tuvalu","UA":"Ukraine","VC":"Saint Vincent and the Grenadines","WS":"Samoa","XK":"Kosovo","ZM":"Zambia"};

const IBAN_PROVIDERS = {
  "DE": [],
  "LU_BC": ["BANKING_CIRCLE"],
  "DK": ["BANKING_CIRCLE"],
  "LU_VIVID": ["THUNES","WISE"],
  "NL": ["THUNES","WISE"],
  "ES": ["THUNES","WISE"],
  "IT": ["THUNES","WISE"],
  "FR": ["THUNES","WISE"]
};

const PROVIDER_LABEL = {"BANKING_CIRCLE":"Banking Circle","THUNES":"Thunes","WISE":"Wise"};
const PROVIDER_CLASS = {"BANKING_CIRCLE":"bc","THUNES":"thunes","WISE":"wise"};

const countryList = Object.entries(COUNTRY_NAMES).map(([code,name])=>({code,name})).sort((a,b)=>a.name.localeCompare(b.name));

let selectedCountry = null;
let activeIdx = -1;

const inp = document.getElementById('country-input');
const sugg = document.getElementById('suggestions');
const clearBtn = document.getElementById('clear-country');
const label = document.getElementById('selected-country-label');
const currSel = document.getElementById('currency-select');
const ibanSel = document.getElementById('iban-select');
const resultBox = document.getElementById('result-box');

function showSuggestions(q){
  const matches = countryList.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())||c.code.toLowerCase()===q.toLowerCase()).slice(0,8);
  if(!matches.length||!q){sugg.style.display='none';return;}
  sugg.innerHTML=matches.map((c,i)=>`<div class="suggestion" data-code="${c.code}" data-idx="${i}">${c.name} <span style="color:var(--color-text-tertiary);font-size:11px">${c.code}</span></div>`).join('');
  sugg.style.display='block';
  activeIdx=-1;
}

function selectCountry(code){
  selectedCountry=code;
  inp.value=COUNTRY_NAMES[code]||code;
  label.textContent='';
  sugg.style.display='none';
  clearBtn.style.display='inline';
  populateCurrencies(code);
  checkTransfer();
}

function populateCurrencies(code){
  const corr=CORRIDORS[code]||{};
  const currencies=Object.keys(corr).sort();
  currSel.innerHTML='<option value="">Select...</option>'+currencies.map(c=>`<option value="${c}">${c}</option>`).join('');
}

inp.addEventListener('input',()=>{
  const q=inp.value.trim();
  if(!q){clearCountry();return;}
  showSuggestions(q);
});

inp.addEventListener('keydown',e=>{
  const items=sugg.querySelectorAll('.suggestion');
  if(e.key==='ArrowDown'){activeIdx=Math.min(activeIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));e.preventDefault();}
  else if(e.key==='ArrowUp'){activeIdx=Math.max(activeIdx-1,0);items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));e.preventDefault();}
  else if(e.key==='Enter'&&activeIdx>=0){selectCountry(items[activeIdx].dataset.code);}
  else if(e.key==='Escape'){sugg.style.display='none';}
});

sugg.addEventListener('click',e=>{
  const t=e.target.closest('.suggestion');
  if(t)selectCountry(t.dataset.code);
});

clearBtn.addEventListener('click',clearCountry);

function clearCountry(){
  selectedCountry=null;inp.value='';label.textContent='';
  sugg.style.display='none';clearBtn.style.display='none';
  currSel.innerHTML='<option value="">Select...</option>';
  showIdle();
}

document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))sugg.style.display='none';});

currSel.addEventListener('change',checkTransfer);
ibanSel.addEventListener('change',checkTransfer);

function showIdle(){
  resultBox.className='result';
  resultBox.innerHTML='<div class="idle">Select a country, currency and IBAN type to check transfer eligibility.</div>';
}

function checkTransfer(){
  const country=selectedCountry;
  const currency=currSel.value;
  const iban=ibanSel.value;
  if(!country||!currency||!iban){showIdle();return;}

  const countryName=COUNTRY_NAMES[country]||country;
  const ibanProviders=IBAN_PROVIDERS[iban];

  if(iban==='DE'){
    resultBox.className='result fail';
    resultBox.innerHTML=`<div class="result-title fail">Not possible</div><div class="result-body">DE IBANs cannot send international (non-SEPA) transfers. The customer should open a currency account (LU IBAN via Banking Circle) or a Vivid-issued LU IBAN to send internationally.</div>`;
    return;
  }

  const corr=CORRIDORS[country];
  if(!corr||!corr[currency]){
    resultBox.className='result fail';
    resultBox.innerHTML=`<div class="result-title fail">Not supported</div><div class="result-body">${currency} transfers to ${countryName} are not available on any rail. This corridor does not exist in the payment data.</div>`;
    return;
  }

  const corridorData=corr[currency];
  const corridorProviders=corridorData.p;
  const directions=corridorData.d;

  const matchingProviders=ibanProviders.filter(p=>corridorProviders.includes(p));

  if(matchingProviders.length===0){
    const allProviders=corridorProviders;
    resultBox.className='result warn';
    const provPills=allProviders.map(p=>`<span class="pill ${PROVIDER_CLASS[p]}">${PROVIDER_LABEL[p]}</span>`).join('');
    resultBox.innerHTML=`<div class="result-title warn">Not available from this IBAN</div>
      <div class="result-body">
        ${currency} to ${countryName} is supported, but not via the rails available to this IBAN type.<br><br>
        This corridor is available via: <div class="pills">${provPills}</div>
        The customer would need a different IBAN type to send this transfer.
      </div>`;
    return;
  }

  const dirPills=directions.map(d=>`<span class="pill ${d==='B2B'?'b2b':'b2c'}">${d}</span>`).join('');
  const provPills=matchingProviders.map(p=>`<span class="pill ${PROVIDER_CLASS[p]}">${PROVIDER_LABEL[p]}</span>`).join('');

  const b2bOnly=directions.length===1&&directions[0]==='B2B';
  const b2cOnly=directions.length===1&&directions[0]==='B2C';

  let note='';
  if(b2bOnly) note='<br><br><strong style="font-size:12px;color:var(--color-text-warning)">B2B only</strong> — this corridor only supports business-to-business transfers.';
  if(b2cOnly) note='<br><br><strong style="font-size:12px;color:var(--color-text-warning)">B2C only</strong> — this corridor only supports business-to-consumer transfers.';

  let chinaNote='';
  if(country==='CN') chinaNote='<br><br><em style="font-size:12px">China note: transfers are only supported to 26 specific bank BICs, and purpose of transfer + supporting documents are required.</em>';

  resultBox.className='result ok';
  resultBox.innerHTML=`<div class="result-title ok">Transfer supported</div>
    <div class="result-body">
      ${currency} to ${countryName} is possible from this IBAN type.
      <div class="pills" style="margin-top:8px">${provPills}${dirPills}</div>
      ${note}${chinaNote}
    </div>`;
}
</script>
